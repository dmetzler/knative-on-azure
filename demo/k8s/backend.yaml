apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-backend
  labels:
    app: demo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-backend
  template:
    metadata:
      labels:
        app: demo-backend
    spec:
      containers:
        - name: backend
          image: acrknativelab.azurecr.io/demo-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: MOCK_MODE
              value: "false"
            - name: BROKER_URL
              value: "http://broker-ingress.knative-eventing.svc.cluster.local/default/default"
            - name: AZURE_SERVICEBUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: azure-servicebus-demo
                  key: connectionString
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: demo-backend
spec:
  selector:
    app: demo-backend
  ports:
    - port: 8000
      targetPort: 8000
