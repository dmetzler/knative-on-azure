apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: acmeservice
spec:
  schema:
    apiVersion: platform.acme.com/v1alpha1
    kind: AcmeService
    spec:
      template:
        metadata:
          labels:
            type: object
            additionalProperties:
              type: string
          annotations:
            type: object
            additionalProperties:
              type: string
        spec:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      service:
        port:
          type: integer
        type:
          type: string
          default: ClusterIP
      scaling:
        type:
          type: string
          default: knative
          # "knative" = ksvc (scale-to-zero, revisions, concurrency-based autoscaling)
          # "static"  = Deployment + Service (always-on)
        minScale:
          type: integer
          default: 0
        maxScale:
          type: integer
          default: 10
        concurrency:
          type: integer
          default: 100
      security:
        ingress:
          type: boolean
          default: false
        eventingSink:
          type: boolean
          default: false
        eventingSource:
          type: boolean
          default: false
        allowFrom:
          type: array
          items:
            type: string
          default: []

  resources:
    # --- ServiceAccount (unique identity per service) ---
    - id: serviceaccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}

    # =============================================
    # STATIC mode: Deployment + Service
    # =============================================

    - id: deployment
      includeWhen:
        - ${schema.spec.scaling.type == "static"}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
          labels: ${schema.spec.template.metadata.labels}
        spec:
          replicas: 1
          selector:
            matchLabels: ${schema.spec.template.metadata.labels}
          template:
            metadata:
              labels: ${schema.spec.template.metadata.labels}
              annotations: ${schema.spec.template.metadata.annotations}
            spec:
              serviceAccountName: ${schema.metadata.name}
              containers: ${schema.spec.template.spec.containers}

    - id: service
      includeWhen:
        - ${schema.spec.scaling.type == "static"}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          type: ${schema.spec.service.type}
          selector: ${schema.spec.template.metadata.labels}
          ports:
            - port: ${schema.spec.service.port}
              targetPort: ${schema.spec.service.port}

    # =============================================
    # KNATIVE mode: KNative Service (ksvc)
    # =============================================

    - id: ksvc
      includeWhen:
        - ${schema.spec.scaling.type == "knative"}
      template:
        apiVersion: serving.knative.dev/v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
          labels: ${schema.spec.template.metadata.labels}
        spec:
          template:
            metadata:
              labels: ${schema.spec.template.metadata.labels}
              annotations:
                autoscaling.knative.dev/minScale: ${string(schema.spec.scaling.minScale)}
                autoscaling.knative.dev/maxScale: ${string(schema.spec.scaling.maxScale)}
                autoscaling.knative.dev/target: ${string(schema.spec.scaling.concurrency)}
            spec:
              serviceAccountName: ${schema.metadata.name}
              containerConcurrency: ${schema.spec.scaling.concurrency}
              containers: ${schema.spec.template.spec.containers}

    # =============================================
    # Security: NetworkPolicies
    # =============================================

    # Default deny ingress on this pod
    - id: netpol-deny
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: ${schema.metadata.name}-deny-ingress
          namespace: ${schema.metadata.namespace}
        spec:
          podSelector:
            matchLabels: ${schema.spec.template.metadata.labels}
          policyTypes:
            - Ingress

    # Allow KNative eventing/serving/kourier (if eventingSink)
    - id: netpol-eventing
      includeWhen:
        - ${schema.spec.security.eventingSink}
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: ${schema.metadata.name}-allow-eventing
          namespace: ${schema.metadata.namespace}
        spec:
          podSelector:
            matchLabels: ${schema.spec.template.metadata.labels}
          policyTypes:
            - Ingress
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: knative-eventing
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: knative-serving
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kourier-system
              ports:
                - protocol: TCP
                  port: ${schema.spec.service.port}
                - protocol: TCP
                  port: 8012
                - protocol: TCP
                  port: 8013
                - protocol: TCP
                  port: 8080
                - protocol: TCP
                  port: 8443

    # Allow external ingress (if ingress)
    - id: netpol-ingress
      includeWhen:
        - ${schema.spec.security.ingress}
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: ${schema.metadata.name}-allow-ingress
          namespace: ${schema.metadata.namespace}
        spec:
          podSelector:
            matchLabels: ${schema.spec.template.metadata.labels}
          policyTypes:
            - Ingress
          ingress:
            - ports:
                - protocol: TCP
                  port: ${schema.spec.service.port}

    # Allow from specific services (collection)
    - id: netpol-allow-from
      forEach:
        - svc: ${schema.spec.security.allowFrom}
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: ${schema.metadata.name}-allow-from-${svc}
          namespace: ${schema.metadata.namespace}
        spec:
          podSelector:
            matchLabels: ${schema.spec.template.metadata.labels}
          policyTypes:
            - Ingress
          ingress:
            - from:
                - podSelector:
                    matchLabels:
                      app: ${svc}
              ports:
                - protocol: TCP
                  port: ${schema.spec.service.port}

    # =============================================
    # Security: Istio AuthorizationPolicies
    # =============================================

    # Allow KNative eventing (if eventingSink)
    - id: authz-eventing
      includeWhen:
        - ${schema.spec.security.eventingSink}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.metadata.name}-allow-eventing
          namespace: ${schema.metadata.namespace}
        spec:
          selector:
            matchLabels: ${schema.spec.template.metadata.labels}
          action: ALLOW
          rules:
            - from:
                - source:
                    namespaces:
                      - knative-eventing
                      - knative-serving
                      - kourier-system

    # Allow external (if ingress)
    - id: authz-ingress
      includeWhen:
        - ${schema.spec.security.ingress}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.metadata.name}-allow-ingress
          namespace: ${schema.metadata.namespace}
        spec:
          selector:
            matchLabels: ${schema.spec.template.metadata.labels}
          action: ALLOW
          rules:
            - {}

    # Allow from specific services (collection)
    - id: authz-allow-from
      forEach:
        - svc: ${schema.spec.security.allowFrom}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.metadata.name}-allow-from-${svc}
          namespace: ${schema.metadata.namespace}
        spec:
          selector:
            matchLabels: ${schema.spec.template.metadata.labels}
          action: ALLOW
          rules:
            - from:
                - source:
                    principals:
                      - cluster.local/ns/${schema.metadata.namespace}/sa/${svc}
