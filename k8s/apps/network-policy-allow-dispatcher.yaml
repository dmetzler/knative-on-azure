# Allow KNative dispatcher to deliver events to demo-backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-knative-dispatcher
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: demo-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: knative-eventing
      ports:
        - protocol: TCP
          port: 8000
