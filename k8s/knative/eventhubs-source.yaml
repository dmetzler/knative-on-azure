# Azure Event Hubs → KNative via Kafka protocol
#
# Event Hubs exposes a Kafka-compatible endpoint on Standard/Premium tier:
#   <namespace>.servicebus.windows.net:9093
#
# Auth: SASL_SSL + PLAIN mechanism
#   username: $ConnectionString (literal)
#   password: <SAS connection string>
#
# The KafkaSource (from knative-extensions/eventing-kafka-broker) natively
# speaks Kafka, so Event Hubs appears as a standard Kafka cluster.
#
# This file is generated by scripts/setup-kafka-source.sh — do not apply manually.
