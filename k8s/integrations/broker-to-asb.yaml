# Broker → ASB: subscribes to events matching type 'asb.outbound'
# from the Kafka Broker and forwards them to Service Bus queue 'knative-outbound'.
# Serializes the full CloudEvent (structured JSON) before sending.
apiVersion: camel.apache.org/v1
kind: Integration
metadata:
  name: broker-to-asb
  namespace: default
spec:
  dependencies:
    - "camel:azure-servicebus"
    - "camel:knative"
    - "camel:jackson"
  sources:
    - name: broker-to-asb.yaml
      language: yaml
      content: |
        - from:
            uri: "knative:event/asb.outbound"
            parameters:
              kind: Broker
              name: default
            steps:
              - log:
                  message: "Forwarding CloudEvent to ASB: type=${header.ce-type}, source=${header.ce-source}, id=${header.ce-id}"
              - marshal:
                  json:
                    library: jackson
              - setBody:
                  simple: '{"specversion":"${header.ce-specversion}","type":"${header.ce-type}","source":"${header.ce-source}","id":"${header.ce-id}","time":"${header.ce-time}","datacontenttype":"application/json","data":${body}}'
              - setHeader:
                  name: "ContentType"
                  constant: "application/cloudevents+json"
              - to:
                  uri: "azure-servicebus:knative-outbound"
                  parameters:
                    serviceBusType: queue
                    connectionString: "RAW({{asb.connection-string}})"
  traits:
    knative:
      configuration:
        enabled: true
    mount:
      configuration:
        configs:
          - "secret:azure-servicebus-props"
