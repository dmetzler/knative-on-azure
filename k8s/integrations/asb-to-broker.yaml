# ASB → Broker: forwards CloudEvents from Service Bus queue directly to KNative Broker
# If the message is already a structured CloudEvent, forward as-is.
# If not, send to DLQ.
apiVersion: camel.apache.org/v1
kind: Integration
metadata:
  name: asb-to-broker
  namespace: default
spec:
  dependencies:
    - "camel:azure-servicebus"
    - "camel:knative"
    - "camel:jackson"
    - "camel:http"
  sources:
    - name: asb-to-broker.yaml
      language: yaml
      content: |
        - from:
            uri: "azure-servicebus:knative-inbound"
            parameters:
              serviceBusType: queue
              connectionString: "RAW({{asb.connection-string}})"
            steps:
              - convertBodyTo:
                  type: "java.lang.String"
              - choice:
                  when:
                    - simple: "${body} contains 'specversion'"
                      steps:
                        - setHeader:
                            name: Content-Type
                            constant: "application/cloudevents+json"
                        - setHeader:
                            name: CamelHttpMethod
                            constant: "POST"
                        - to:
                            uri: "http://kafka-broker-ingress.knative-eventing.svc.cluster.local/default/default"
                  otherwise:
                    steps:
                      - log:
                          message: "Non-CloudEvent message, sending to DLQ: ${body}"
                      - to:
                          uri: "azure-servicebus:knative-dlq"
                          parameters:
                            serviceBusType: queue
                            connectionString: "RAW({{asb.connection-string}})"
  traits:
    knative:
      configuration:
        enabled: true
    mount:
      configuration:
        configs:
          - "secret:azure-servicebus-props"
