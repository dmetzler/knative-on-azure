# ASB → Broker: forwards CloudEvents from Service Bus queue directly to KNative Broker
# Messages arriving in ASB are already structured CloudEvents (application/cloudevents+json)
apiVersion: camel.apache.org/v1
kind: Integration
metadata:
  name: asb-to-broker
  namespace: default
spec:
  dependencies:
    - "camel:azure-servicebus"
    - "camel:knative"
    - "camel:jackson"
  sources:
    - name: asb-to-broker.yaml
      language: yaml
      content: |
        - from:
            uri: "azure-servicebus:knative-inbound"
            parameters:
              serviceBusType: queue
              connectionString: "RAW({{asb.connection-string}})"
            steps:
              - convertBodyTo:
                  type: "java.lang.String"
              - setHeader:
                  name: Content-Type
                  constant: "application/cloudevents+json"
              - to:
                  uri: "knative:event"
                  parameters:
                    kind: Broker
                    name: default
  traits:
    knative:
      configuration:
        enabled: true
    mount:
      configuration:
        configs:
          - "secret:azure-servicebus-props"
