# ---- Quarkus ----
quarkus.application.name=asb-bridge

# ---- Azure Service Bus ----
asb.connection-string=${ASB_CONNECTION_STRING:}
asb.queue.inbound=knative-inbound
asb.queue.outbound=knative-outbound

# ---- KNative ----
# Auto-detected when running inside a KNative environment.
# For local dev, set the broker URL manually:
# camel.component.knative.environment-path=classpath:knative.json

# ---- Health ----
quarkus.health.extensions.enabled=true

# ---- Container image (for CI/CD) ----
quarkus.container-image.registry=${ACR_REGISTRY:acrknativelab.azurecr.io}
quarkus.container-image.group=camel
quarkus.container-image.name=asb-bridge
quarkus.container-image.tag=${APP_VERSION:latest}
quarkus.container-image.push=true
quarkus.container-image.builder=jib
