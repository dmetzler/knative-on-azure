# Broker → ASB: receives CloudEvents from KNative Broker, forwards to Service Bus queue
# Serializes the full CloudEvent (headers + body) as structured JSON (application/cloudevents+json)
#
# Uses CamelCloudEvent* headers (set by Camel-K KNative component) with defaults
# to handle cases where a header might be missing.
- from:
    uri: "knative:event/asb.outbound"
    parameters:
      kind: Broker
      name: default
    steps:
      - log:
          message: "Forwarding CloudEvent to ASB: type=${header.CamelCloudEventType}, source=${header.CamelCloudEventSource}, id=${header.CamelCloudEventID}"
      - convertBodyTo:
          type: "java.lang.String"
      # Ensure specversion has a default
      - choice:
          when:
            - simple: "${header.CamelCloudEventSpecVersion} == null || ${header.CamelCloudEventSpecVersion} == ''"
              steps:
                - setHeader:
                    name: CamelCloudEventSpecVersion
                    constant: "1.0"
      - choice:
          when:
            - simple: "${header.CamelCloudEventTime} == null || ${header.CamelCloudEventTime} == ''"
              steps:
                - setHeader:
                    name: CamelCloudEventTime
                    simple: "${date:now:yyyy-MM-dd'T'HH:mm:ss.SSS'Z'}"
      - setBody:
          simple: '{"specversion":"${header.CamelCloudEventSpecVersion}","type":"${header.CamelCloudEventType}","source":"${header.CamelCloudEventSource}","id":"${header.CamelCloudEventID}","time":"${header.CamelCloudEventTime}","datacontenttype":"application/json","data":${body}}'
      - setHeader:
          name: "ContentType"
          constant: "application/cloudevents+json"
      - to:
          uri: "azure-servicebus:{{asb.queue.outbound}}"
          parameters:
            serviceBusType: queue
            connectionString: "RAW({{asb.connection-string}})"
