# ASB → Broker: forwards CloudEvents from Service Bus queue directly to KNative Broker
# If the message is already a structured CloudEvent, forward as-is.
# If not, wrap it in a CloudEvent envelope with a default type.
- from:
    uri: "azure-servicebus:{{asb.queue.inbound}}"
    parameters:
      serviceBusType: queue
      connectionString: "RAW({{asb.connection-string}})"
    steps:
      - convertBodyTo:
          type: "java.lang.String"
      - choice:
          when:
            - simple: "${body} contains 'specversion'"
              steps:
                - setHeader:
                    name: Content-Type
                    constant: "application/cloudevents+json"
                - to:
                    uri: "knative:event"
                    parameters:
                      kind: Broker
                      name: default
          otherwise:
            steps:
              - log:
                  message: "Non-CloudEvent message received, wrapping: ${body}"
              - setHeader:
                  name: ce-type
                  constant: "com.azure.servicebus.raw"
              - setHeader:
                  name: ce-source
                  constant: "/azure/servicebus/knative-inbound"
              - setHeader:
                  name: ce-specversion
                  constant: "1.0"
              - setHeader:
                  name: ce-id
                  expression:
                    simple: "${exchangeId}"
              - setHeader:
                  name: Content-Type
                  constant: "application/json"
              - to:
                  uri: "knative:event/com.azure.servicebus.raw"
                  parameters:
                    kind: Broker
                    name: default
