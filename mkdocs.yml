site_name: KNative on Azure
site_description: Deploy KNative Serving & Eventing on AKS with Azure Event Hubs (Kafka mode)
repo_url: https://github.com/dmetzler/knative-on-azure

theme:
  name: material
  palette:
    primary: indigo
    accent: cyan
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Prerequisites: prerequisites.md
  - Deployment Guide:
      - 1. Infrastructure (Terraform): deploy/01-infrastructure.md
      - 2. KNative Installation: deploy/02-knative.md
      - 3. Kafka Broker + Event Hubs: deploy/03-kafka-broker.md
      - 4. Demo Application: deploy/04-demo-app.md
  - Troubleshooting: troubleshooting.md
  - Teardown: teardown.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - toc:
      permalink: true
