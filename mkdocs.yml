site_name: KNative on Azure
site_description: Platform Engineering POC — KNative, Istio, KRO on AKS
repo_url: https://github.com/dmetzler/knative-on-azure

theme:
  name: material
  palette:
    primary: indigo
    accent: cyan
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Security Model: security.md
  - AcmeService (KRO): acmeservice.md
  - GitOps (ArgoCD): gitops.md
  - Prerequisites: prerequisites.md
  - Deployment Guide:
      - 1. Infrastructure (Terraform): deploy/01-infrastructure.md
      - 2. KNative Installation: deploy/02-knative.md
      - 3. Kafka Broker + Event Hubs: deploy/03-kafka-broker.md
      - 4. Demo Application: deploy/04-demo-app.md
      - 5. Workload Identity (No Static Creds): deploy/05-workload-identity.md
      - 6. Camel-K + Service Bus Bridge: deploy/06-camel-k-asb.md
      - 7. Production Considerations: deploy/07-production-considerations.md
  - Troubleshooting: troubleshooting.md
  - OAUTHBEARER Recon (Phase 0): phase0-recon.md
  - Teardown: teardown.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - toc:
      permalink: true
